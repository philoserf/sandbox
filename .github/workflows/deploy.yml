name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history so enableGitInfo populates accurate Lastmod

      - name: Install Hugo # intentional: track latest Hugo release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download --repo gohugoio/hugo \
            --pattern 'hugo_extended_[0-9]*_linux-amd64.tar.gz' \
            --output hugo.tar.gz
          tar -xzf hugo.tar.gz hugo
          sudo mv hugo /usr/local/bin/
          hugo version

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Build
        run: hugo --minify
        env:
          HUGO_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
